upstream django_backend {
    server 172.22.0.3:8000;
}

upstream seaweedfs_s3 {
    server 172.22.0.6:8333;
}

server {
    listen 80;
    server_name musicdjam.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name musicdjam.local;

    ssl_certificate /etc/ssl/certs/musicdjam.crt;
    ssl_certificate_key /etc/ssl/private/musicdjam.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 100M;

    location /admin/ {
        deny all;
        return 404;
    }

    location / {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /music-catalog/ {
        proxy_pass http://seaweedfs_s3;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}