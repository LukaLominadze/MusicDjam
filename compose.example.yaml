services:
  nginx:
    image: nginx:1.27-alpine
    container_name: djam_nginx
    restart: unless-stopped
    ports:
      - "$NGINX_PUBLIC_PORT$:443"
    volumes:
      - ./DockerScripts/Nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl/certs:/etc/ssl/certs:ro
      - ./ssl/private:/etc/ssl/private:ro
    networks:
      djam_net:
        ipv4_address: $IP_NGINX$
    depends_on:
      - django

  django:
    build:
      context: ./music_djam_api
      dockerfile: Dockerfile
    container_name: djam_api
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./music_djam_api:/app
    networks:
      djam_net:
        ipv4_address: $IP_DJANGO$
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: djam_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: $POSTGRES_DB$
      POSTGRES_USER: $POSTGRES_USER$
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD$
    volumes:
      - postgres_metadata:/var/lib/postgresql/data
    networks:
      djam_net:
        ipv4_address: $IP_POSTGRES$

  redis:
    image: redis:7.2-alpine
    container_name: djam_cache
    restart: unless-stopped
    command: redis-server --requirepass $REDIS_PASSWORD$
    volumes:
      - redis_metadata:/data
    networks:
      djam_net:
        ipv4_address: $IP_REDIS$

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: djam_storage
    restart: unless-stopped
    command: 'server -dir=/data -s3 -s3.key.id=$SEAWEEDFS_MASTER_KEY$ -s3.accessKey=$SEAWEEDFS_MASTER_SECRET$'
    volumes:
      - /var/djam_media_store:/data   # Uses host engine bare disk filesystem for assets
      - seaweed_metadata:/root/.seaweedfs  # Metadata persistence via volume
    networks:
      djam_net:
        ipv4_address: $IP_SEAWEEDFS$

  adminer:
    image: adminer:latest
    container_name: djam_adminer
    restart: unless-stopped
    networks:
      djam_net:
        ipv4_address: $IP_ADMINER$

volumes:
  postgres_metadata:
  redis_metadata:
  seaweed_metadata:

networks:
  djam_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16