<div class="music-card" data-artist-id="{{id}}">
    <div class="music-card-inner">
        <div class="music-card-cover">
            <img src="{{cover_url}}" alt="Cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="music-card-cover-fallback" style="display:none;">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="var(--text-muted)" viewBox="0 0 16 16">
                    <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/>
                </svg>
            </div>
        </div>
        <div class="music-card-info">
            <div class="music-card-title">{{name}}</div>
            <div class="music-card-artist">Artist</div>
        </div>
    </div>
</div>
