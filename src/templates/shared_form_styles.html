<style>
    .entity-form-container {
        max-width: 600px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
        padding-bottom: 120px;
        position: relative;
        z-index: 1;
    }

    .entity-form-card {
        background: linear-gradient(145deg, rgba(26, 14, 48, 0.95), rgba(18, 9, 42, 0.98));
        border: 1px solid var(--border-subtle);
        border-radius: 20px;
        backdrop-filter: blur(20px);
        padding: 2rem;
        box-shadow:
            0 8px 32px rgba(0, 0, 0, 0.4),
            0 0 80px rgba(233, 30, 140, 0.06);
        animation: fadeInUp 0.6s ease-out;
    }

    .entity-form-header {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1.5rem;
    }

    .entity-form-back {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        color: var(--text-muted);
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 600;
        transition: color 0.2s ease;
    }

    .entity-form-back:hover {
        color: var(--accent-pink);
    }

    .entity-form-title {
        font-size: 1.5rem;
        font-weight: 800;
        margin: 0;
    }

    .entity-form-group {
        margin-bottom: 1.25rem;
    }

    .entity-form-group label {
        display: block;
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-muted);
        margin-bottom: 0.4rem;
    }

    .entity-form-group input[type="text"],
    .entity-form-group input[type="file"],
    .entity-form-group select,
    .entity-form-group textarea {
        background: var(--bg-input);
        border: 1.5px solid rgba(155, 89, 182, 0.2);
        border-radius: 12px;
        color: var(--text-primary);
        padding: 0.75rem 1rem;
        font-size: 0.95rem;
        font-family: 'Inter', sans-serif;
        width: 100%;
        transition: all 0.25s ease;
    }

    .entity-form-group input[type="text"]:focus,
    .entity-form-group input[type="file"]:focus,
    .entity-form-group select:focus,
    .entity-form-group textarea:focus {
        border-color: var(--accent-pink);
        box-shadow: 0 0 0 3px var(--glow-pink);
        background: var(--bg-input);
        color: var(--text-primary);
        outline: none;
    }

    .entity-form-group input[type="text"]::placeholder,
    .entity-form-group textarea::placeholder {
        color: rgba(176, 160, 200, 0.5);
    }

    .entity-form-group select {
        appearance: none;
        cursor: pointer;
    }

    .entity-form-group textarea {
        min-height: 100px;
        resize: vertical;
    }

    .entity-form-checkbox {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 1.25rem;
    }

    .entity-form-checkbox label {
        font-size: 0.95rem;
        color: var(--text-primary);
        text-transform: none;
        letter-spacing: 0;
        font-weight: 500;
        margin-bottom: 0;
    }

    .entity-form-checkbox input[type="checkbox"] {
        accent-color: var(--accent-pink);
        width: 18px;
        height: 18px;
        cursor: pointer;
    }

    .entity-form-cover-upload {
        width: 120px;
        height: 120px;
        border: 2px dashed rgba(155, 89, 182, 0.3);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.25s ease;
        overflow: hidden;
        background: var(--bg-input);
        margin-bottom: 1.25rem;
    }

    .entity-form-cover-upload:hover {
        border-color: var(--accent-pink);
        box-shadow: 0 0 20px rgba(233, 30, 140, 0.15);
    }

    .entity-form-cover-upload img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 14px;
    }

    .entity-form-submit {
        background: linear-gradient(135deg, var(--accent-pink), #c01070, var(--accent-gold));
        background-size: 200% 200%;
        border: none;
        border-radius: 12px;
        padding: 0.75rem;
        font-weight: 700;
        font-size: 1rem;
        letter-spacing: 0.5px;
        color: #fff;
        width: 100%;
        cursor: pointer;
        transition: all 0.35s ease;
        box-shadow: 0 4px 20px rgba(233, 30, 140, 0.3);
    }

    .entity-form-submit:hover {
        background-position: 100% 0;
        box-shadow: 0 6px 30px rgba(233, 30, 140, 0.5);
        transform: translateY(-1px);
    }

    .entity-form-submit:active {
        transform: translateY(0);
    }

    .entity-form-submit:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
    }

    .entity-form-error {
        display: none;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 1rem;
        padding: 0.75rem 1rem;
        border-radius: 12px;
        font-size: 0.85rem;
        font-weight: 500;
        color: #ffb3b3;
        background: rgba(255, 50, 50, 0.12);
        border: 1px solid rgba(255, 50, 50, 0.3);
        animation: errorSlideIn 0.3s ease-out;
    }

    .entity-form-error.is-visible {
        display: flex;
    }

    .field-error {
        display: none;
        align-items: center;
        gap: 0.4rem;
        margin-top: 0.45rem;
        padding: 0.5rem 0.75rem;
        border-radius: 10px;
        font-size: 0.8rem;
        font-weight: 500;
        color: #ffb3b3;
        background: rgba(255, 50, 50, 0.1);
        border: 1px solid rgba(255, 50, 50, 0.25);
        animation: errorSlideIn 0.3s ease-out;
    }

    .field-error.is-visible {
        display: flex;
    }

    .field-error svg {
        flex-shrink: 0;
    }

    .form-control.has-error {
        border-color: rgba(255, 50, 50, 0.6) !important;
        box-shadow: 0 0 0 3px rgba(255, 50, 50, 0.15) !important;
    }

    .form-control.has-error:focus {
        border-color: #ff3232 !important;
        box-shadow: 0 0 0 3px rgba(255, 50, 50, 0.25) !important;
    }

    .entity-form-file-label {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.6rem 1.2rem;
        background: var(--bg-input);
        border: 1.5px solid rgba(155, 89, 182, 0.3);
        border-radius: 12px;
        color: var(--text-primary);
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.25s ease;
    }

    .entity-form-file-label:hover {
        border-color: var(--accent-pink);
        box-shadow: 0 0 12px rgba(233, 30, 140, 0.15);
    }

    .entity-form-file-name {
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-top: 0.3rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .entity-form-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 0.5rem;
    }

    .entity-form-tag {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.35rem 0.75rem;
        background: rgba(155, 89, 182, 0.15);
        border: 1px solid rgba(155, 89, 182, 0.25);
        border-radius: 20px;
        font-size: 0.85rem;
        color: var(--text-primary);
        animation: fadeInUp 0.3s ease-out;
    }

    .entity-form-tag .tag-remove {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        height: 18px;
        border: none;
        background: rgba(255, 50, 50, 0.2);
        color: #ffb3b3;
        border-radius: 50%;
        font-size: 0.75rem;
        cursor: pointer;
        transition: all 0.2s ease;
        line-height: 1;
        padding: 0;
    }

    .entity-form-tag .tag-remove:hover {
        background: rgba(255, 50, 50, 0.4);
        color: #fff;
    }

    .entity-form-search-results {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 12px;
        max-height: 200px;
        overflow-y: auto;
        z-index: 10;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        margin-top: 0.25rem;
    }

    .entity-form-search-item {
        padding: 0.65rem 1rem;
        font-size: 0.9rem;
        color: var(--text-primary);
        cursor: pointer;
        transition: background 0.15s ease;
    }

    .entity-form-search-item:hover {
        background: rgba(233, 30, 140, 0.1);
    }

    .entity-form-hint {
        font-size: 0.78rem;
        color: var(--text-muted);
        opacity: 0.7;
        margin-top: 0.3rem;
    }

    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(24px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes errorSlideIn {
        from {
            opacity: 0;
            transform: translateY(-6px);
            max-height: 0;
        }
        to {
            opacity: 1;
            transform: translateY(0);
            max-height: 80px;
        }
    }

    @keyframes errorSlideOut {
        from {
            opacity: 1;
            transform: translateY(0);
            max-height: 80px;
        }
        to {
            opacity: 0;
            transform: translateY(-6px);
            max-height: 0;
        }
    }

    .field-error.is-hiding {
        display: flex;
        animation: errorSlideOut 0.25s ease-in forwards;
    }
</style>
