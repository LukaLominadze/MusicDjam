<div class="music-card" data-music-id="{{id}}">
    <input type="hidden" class="fs-id" value="{{fs_id}}">
    <div class="music-card-inner">
        <div class="music-card-cover">
            <img src="{{cover_url}}" alt="Cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="music-card-cover-fallback" style="display:none;">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="var(--text-muted)" viewBox="0 0 16 16">
                    <path d="M6 13c0 1.105-1.12 2-2.5 2S1 14.105 1 13s1.12-2 2.5-2 2.5.895 2.5 2m9-2c0 1.105-1.12 2-2.5 2s-2.5-.895-2.5-2 1.12-2 2.5-2 2.5.895 2.5 2"/>
                    <path fill-rule="evenodd" d="M14 11V2h1v11zM1.5 2a.5.5 0 0 0-.5.5v11a.5.5 0 0 0 1 0V2.5A.5.5 0 0 0 1.5 2m13-1a.5.5 0 0 0-.5-.5H14v11h.5a.5.5 0 0 0 0-1h-13a.5.5 0 0 0 0 1H2V1.5a.5.5 0 0 0-.5-.5z"/>
                    <path d="M4 3a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1V4zm5-1a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1V2z"/>
                </svg>
            </div>
        </div>
        <div class="music-card-info">
            <div class="music-card-title">{{title}}</div>
            <div class="music-card-artist">{{artist_name}}</div>
            <div class="music-card-album">{{album_title}}</div>
            <div class="music-card-length">{{length_formatted}}</div>
        </div>
        <div class="music-card-actions">
            <div class="card-action-btns">
                {{card_edit_btn}}{{card_delete_btn}}
            </div>
            <button class="music-card-play-btn {{play_disabled}}" onclick="event.stopPropagation(); togglePlay({{id}}, this)" title="Play">
                <svg class="icon-play" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                    <path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/>
                </svg>
                <svg class="icon-pause" style="display:none;" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M5.5 3.5A1.5 1.5 0 0 1 7 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5m5 0A1.5 1.5 0 0 1 12 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5"/>
                </svg>
            </button>
        </div>
    </div>
</div>
