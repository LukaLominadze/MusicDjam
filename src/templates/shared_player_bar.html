<div class="player-bar hidden" id="playerBar">
    <div class="player-info">
        <div class="player-cover" id="playerCover"></div>
        <div class="player-text">
            <div class="player-title" id="playerTitle">-</div>
            <div class="player-artist" id="playerArtist">-</div>
        </div>
    </div>
    <div class="player-controls">
        <button class="player-play-btn" id="playerPlayBtn" onclick="playerTogglePlay()">
            <svg class="icon-play" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                <path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/>
            </svg>
            <svg class="icon-pause" style="display:none;" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                <path d="M5.5 3.5A1.5 1.5 0 0 1 7 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5m5 0A1.5 1.5 0 0 1 12 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5"/>
            </svg>
        </button>
        <button class="player-stop-btn" id="playerStopBtn" onclick="playerStop()" title="Stop">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                <rect x="3" y="3" width="10" height="10" rx="1.5"/>
            </svg>
        </button>
    </div>
    <div class="player-progress-wrap">
        <span class="player-time" id="playerCurrentTime">0:00</span>
        <div class="player-progress" id="playerProgress" onclick="seekAudio(event)">
            <div class="player-progress-fill" id="playerProgressFill"></div>
        </div>
        <span class="player-time" id="playerTotalTime">0:00</span>
    </div>
    <div class="player-volume">
        <svg id="volumeIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" onclick="toggleMute()">
            <path d="M11.536 14.01A8.47 8.47 0 0 0 14.026 8a8.47 8.47 0 0 0-2.49-6.01l-.708.707A7.48 7.48 0 0 1 13.025 8c0 2.071-.84 3.946-2.197 5.303z"/>
            <path d="M10.121 12.596A6.48 6.48 0 0 0 12.025 8a6.48 6.48 0 0 0-1.904-4.596l-.707.707A5.48 5.48 0 0 1 11.025 8a5.48 5.48 0 0 1-1.61 3.89z"/>
            <path d="M8.707 11.182A4.5 4.5 0 0 0 10.025 8a4.5 4.5 0 0 0-1.318-3.182L8 5.525A3.5 3.5 0 0 1 9.025 8 3.5 3.5 0 0 1 8 10.475zM6.717 3.55A.5.5 0 0 1 7 4v8a.5.5 0 0 1-.812.39L3.825 10.5H1.5A.5.5 0 0 1 1 10V6a.5.5 0 0 1 .5-.5h2.325l2.363-1.89a.5.5 0 0 1 .529-.06"/>
        </svg>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" oninput="setVolume(this.value)">
    </div>
</div>

<script>
function showPlayerBar(musicItem) {
    const bar = document.getElementById('playerBar');
    bar.classList.remove('hidden');

    document.getElementById('playerTitle').textContent = musicItem.title || 'Untitled';
    document.getElementById('playerArtist').textContent = musicItem.artist ? musicItem.artist.name : 'Unknown Artist';
    document.getElementById('playerTotalTime').textContent = formatLength(musicItem.length);

    const coverEl = document.getElementById('playerCover');
    if (musicItem.artist && musicItem.artist.id) {
        const cacheKey = 'cover_artist_' + musicItem.artist.id;
        const cached = sessionStorage.getItem(cacheKey);
        if (cached) {
            coverEl.innerHTML = '<img src="' + cached + '" alt="Cover">';
        } else {
            coverEl.innerHTML = '';
            fetch('/api/artist/' + musicItem.artist.id + '/download-cover/', { credentials: 'same-origin' })
                .then(function(r) { return r.ok ? r.json() : null; })
                .then(function(data) {
                    if (data && data.download_url) {
                        sessionStorage.setItem(cacheKey, data.download_url);
                        coverEl.innerHTML = '<img src="' + data.download_url + '" alt="Cover">';
                    }
                }).catch(function() {});
        }
    }
}

function playerTogglePlay() {
    if (!currentPlayingId) return;
    if (isPlaying) {
        audio.pause();
        setPlayingState(currentPlayingId, false);
    } else {
        audio.play();
        setPlayingState(currentPlayingId, true);
    }
}

function playerStop() {
    audio.pause();
    audio.currentTime = 0;
    setPlayingState(currentPlayingId, false);
    document.getElementById('playerProgressFill').style.width = '0%';
    document.getElementById('playerCurrentTime').textContent = '0:00';
}

function seekAudio(event) {
    if (!audio.duration) return;
    var bar = document.getElementById('playerProgress');
    var rect = bar.getBoundingClientRect();
    var ratio = (event.clientX - rect.left) / rect.width;
    audio.currentTime = ratio * audio.duration;
}

function setVolume(val) {
    audio.volume = val;
    updateVolumeIcon(val);
}

function toggleMute() {
    var slider = document.getElementById('volumeSlider');
    if (audio.volume > 0) {
        audio._prevVolume = audio.volume;
        audio.volume = 0;
        slider.value = 0;
    } else {
        audio.volume = audio._prevVolume || 1;
        slider.value = audio.volume;
    }
    updateVolumeIcon(audio.volume);
}

function updateVolumeIcon(vol) {
    var icon = document.getElementById('volumeIcon');
    if (vol == 0) {
        icon.innerHTML = '<path d="M6.717 3.55A.5.5 0 0 1 7 4v8a.5.5 0 0 1-.812.39L3.825 10.5H1.5A.5.5 0 0 1 1 10V6a.5.5 0 0 1 .5-.5h2.325l2.363-1.89a.5.5 0 0 1 .529-.06M9.879 5.655a.5.5 0 0 0-.766-.207L7.947 6.65H6.5v2.7h1.447l1.166 1.202a.5.5 0 0 0 .766-.207z"/><line x1="1" y1="1" x2="15" y2="15" stroke="currentColor" stroke-width="1.5"/>';
    } else if (vol < 0.5) {
        icon.innerHTML = '<path d="M11.536 14.01A8.47 8.47 0 0 0 14.026 8a8.47 8.47 0 0 0-2.49-6.01l-.708.707A7.48 7.48 0 0 1 13.025 8c0 2.071-.84 3.946-2.197 5.303z"/><path d="M10.121 12.596A6.48 6.48 0 0 0 12.025 8a6.48 6.48 0 0 0-1.904-4.596l-.707.707A5.48 5.48 0 0 1 11.025 8a5.48 5.48 0 0 1-1.61 3.89z"/><path d="M8.707 11.182A4.5 4.5 0 0 0 10.025 8a4.5 4.5 0 0 0-1.318-3.182L8 5.525A3.5 3.5 0 0 1 9.025 8 3.5 3.5 0 0 1 8 10.475z"/><path d="M6.717 3.55A.5.5 0 0 1 7 4v8a.5.5 0 0 1-.812.39L3.825 10.5H1.5A.5.5 0 0 1 1 10V6a.5.5 0 0 1 .5-.5h2.325l2.363-1.89a.5.5 0 0 1 .529-.06"/>';
    } else {
        icon.innerHTML = '<path d="M11.536 14.01A8.47 8.47 0 0 0 14.026 8a8.47 8.47 0 0 0-2.49-6.01l-.708.707A7.48 7.48 0 0 1 13.025 8c0 2.071-.84 3.946-2.197 5.303z"/><path d="M10.121 12.596A6.48 6.48 0 0 0 12.025 8a6.48 6.48 0 0 0-1.904-4.596l-.707.707A5.48 5.48 0 0 1 11.025 8a5.48 5.48 0 0 1-1.61 3.89z"/><path d="M8.707 11.182A4.5 4.5 0 0 0 10.025 8a4.5 4.5 0 0 0-1.318-3.182L8 5.525A3.5 3.5 0 0 1 9.025 8 3.5 3.5 0 0 1 8 10.475zM6.717 3.55A.5.5 0 0 1 7 4v8a.5.5 0 0 1-.812.39L3.825 10.5H1.5A.5.5 0 0 1 1 10V6a.5.5 0 0 1 .5-.5h2.325l2.363-1.89a.5.5 0 0 1 .529-.06"/>';
    }
}

function updatePlayerPlayBtn(playing) {
    var btn = document.getElementById('playerPlayBtn');
    btn.querySelector('.icon-play').style.display = playing ? 'none' : 'block';
    btn.querySelector('.icon-pause').style.display = playing ? 'block' : 'none';
}
</script>
