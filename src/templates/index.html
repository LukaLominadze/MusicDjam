{% extends 'base.html' %}
{% load static %}

{% block title %}Explore - Earpiece{% endblock %}

{% block head %}
<link rel="stylesheet" href="{% static 'css/explore.css' %}?v=1.0">
<link rel="stylesheet" href="{% static 'css/music.css' %}?v=1.0">
<link rel="stylesheet" href="{% static 'css/player-bar.css' %}?v=1.0">
{% endblock %}

{% block body %}
<div class="explore-container">
    <div class="search-section">
        <div class="view-toggles">
            <button class="view-toggle-btn active" data-view="music" onclick="switchView('music')">Music</button>
            <button class="view-toggle-btn" data-view="artists" onclick="switchView('artists')">Artists</button>
            <button class="view-toggle-btn" data-view="albums" onclick="switchView('albums')">Albums</button>
            <button class="view-toggle-btn" data-view="playlists" onclick="switchView('playlists')">Playlists</button>
            <button class="view-toggle-btn" data-view="users" onclick="switchView('users')">Users</button>
        </div>
        <div class="search-bar">
            <div class="search-input-wrap">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85zm-5.242.156a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
                </svg>
                <input type="text" id="searchInput" placeholder="Search songs, artists, albums..." autofocus>
            </div>
            <button class="filters-toggle" id="filtersToggle" onclick="toggleFilters()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" style="vertical-align: middle; margin-right: 4px;">
                    <path d="M6 10.5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 0 1h-3a.5.5 0 0 1-.5-.5m-2-3a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1-.5-.5m-2-3a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5"/>
                </svg>
                Filters
            </button>
            <button class="btn-search" onclick="doSearch()">Search</button>
        </div>
        <div class="advanced-filters" id="advancedFilters">
            <div class="filter-group">
                <label for="filterTitle">Title</label>
                <input type="text" id="filterTitle" placeholder="Song title">
            </div>
            <div class="filter-group">
                <label for="filterArtist">Artist</label>
                <input type="text" id="filterArtist" placeholder="Artist name">
            </div>
            <div class="filter-group">
                <label for="filterAlbum">Album</label>
                <input type="text" id="filterAlbum" placeholder="Album name">
            </div>
            <div class="filter-group">
                <label for="filterPublic">Visibility</label>
                <select id="filterPublic">
                    <option value="">All</option>
                    <option value="true">Public</option>
                    <option value="false">Private</option>
                </select>
            </div>
        </div>
    </div>

    <div class="loading-spinner" id="loadingSpinner" style="display:none;"></div>
    <div id="musicContainer"></div>

    <div class="pagination" id="pagination" style="display:none;">
        <button class="pagination-btn" id="prevBtn" onclick="changePage(-1)" disabled>Previous</button>
        <span class="pagination-info" id="pageInfo"></span>
        <button class="pagination-btn" id="nextBtn" onclick="changePage(1)" disabled>Next</button>
    </div>
</div>

<div class="player-bar hidden" id="playerBar">
    <div class="player-info">
        <div class="player-cover" id="playerCover"></div>
        <div class="player-text">
            <div class="player-title" id="playerTitle">-</div>
            <div class="player-artist" id="playerArtist">-</div>
        </div>
    </div>
    <div class="player-controls">
        <button class="player-play-btn" id="playerPlayBtn" onclick="playerTogglePlay()">
            <svg class="icon-play" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                <path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/>
            </svg>
            <svg class="icon-pause" style="display:none;" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                <path d="M5.5 3.5A1.5 1.5 0 0 1 7 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5m5 0A1.5 1.5 0 0 1 12 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5"/>
            </svg>
        </button>
        <button class="player-stop-btn" id="playerStopBtn" onclick="playerStop()" title="Stop">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                <rect x="3" y="3" width="10" height="10" rx="1.5"/>
            </svg>
        </button>
    </div>
    <div class="player-progress-wrap">
        <span class="player-time" id="playerCurrentTime">0:00</span>
        <div class="player-progress" id="playerProgress" onclick="seekAudio(event)">
            <div class="player-progress-fill" id="playerProgressFill"></div>
        </div>
        <span class="player-time" id="playerTotalTime">0:00</span>
    </div>
    <div class="player-volume">
        <svg id="volumeIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" onclick="toggleMute()">
            <path d="M11.536 14.01A8.47 8.47 0 0 0 14.026 8a8.47 8.47 0 0 0-2.49-6.01l-.708.707A7.48 7.48 0 0 1 13.025 8c0 2.071-.84 3.946-2.197 5.303z"/>
            <path d="M10.121 12.596A6.48 6.48 0 0 0 12.025 8a6.48 6.48 0 0 0-1.904-4.596l-.707.707A5.48 5.48 0 0 1 11.025 8a5.48 5.48 0 0 1-1.61 3.89z"/>
            <path d="M8.707 11.182A4.5 4.5 0 0 0 10.025 8a4.5 4.5 0 0 0-1.318-3.182L8 5.525A3.5 3.5 0 0 1 9.025 8 3.5 3.5 0 0 1 8 10.475zM6.717 3.55A.5.5 0 0 1 7 4v8a.5.5 0 0 1-.812.39L3.825 10.5H1.5A.5.5 0 0 1 1 10V6a.5.5 0 0 1 .5-.5h2.325l2.363-1.89a.5.5 0 0 1 .529-.06"/>
        </svg>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" oninput="setVolume(this.value)">
    </div>
</div>

<audio id="audioPlayer" preload="auto"></audio>

<script>
const PAGE_SIZE = 30;
let currentPage = 1;
let totalResults = 0;
let currentData = [];
let currentView = 'music';
let audioCache = new Map();
let currentPlayingId = null;
let isPlaying = false;
const currentUserId = '{{ user_id|safe }}';
const currentUserIsStaff = {{ is_staff|yesno:"true,false" }};

const templates = {};

const VIEW_CONFIG = {
    music:    { api: '/api/music/',    template: '/music_card.html',    emptyMsg: 'No music found' },
    artists:  { api: '/api/artist/',   template: '/artist_card.html',  emptyMsg: 'No artists found' },
    albums:   { api: '/api/album/',    template: '/album_card.html',   emptyMsg: 'No albums found' },
    playlists:{ api: '/api/playlist/', template: '/playlist_card.html', emptyMsg: 'No playlists found' },
    users:    { api: '/api/profile/',  template: '/user_card.html',    emptyMsg: 'No users found' },
};

const FILTER_IDS_BY_VIEW = {
    music:     ['filterTitle', 'filterArtist', 'filterAlbum', 'filterPublic'],
    artists:   ['filterArtist'],
    albums:    ['filterTitle', 'filterArtist'],
    playlists: ['filterTitle', 'filterPublic'],
    users:     [],
};

const audio = document.getElementById('audioPlayer');
const searchInput = document.getElementById('searchInput');

searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doSearch();
});

async function loadTemplates() {
    const views = ['music', 'artists', 'albums', 'playlists', 'users'];
    await Promise.all(views.map(async (v) => {
        const resp = await fetch(VIEW_CONFIG[v].template);
        templates[v] = await resp.text();
    }));
}

function switchView(view) {
    if (currentView === view) return;
    currentView = view;
    currentPage = 1;

    document.querySelectorAll('.view-toggle-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.view === view);
    });

    const filterGroups = document.querySelectorAll('.advanced-filters .filter-group');
    const visibleFilters = FILTER_IDS_BY_VIEW[view] || [];
    filterGroups.forEach(g => {
        const input = g.querySelector('input, select');
        if (input) {
            g.style.display = visibleFilters.includes(input.id) ? '' : 'none';
        }
    });

    const placeholder = { music: 'Search songs, artists, albums...', artists: 'Search artists...', albums: 'Search albums...', playlists: 'Search playlists...', users: 'Search users...' };
    searchInput.placeholder = placeholder[view] || '';

    fetchAndRender();
}

function toggleFilters() {
    const el = document.getElementById('advancedFilters');
    const btn = document.getElementById('filtersToggle');
    el.classList.toggle('visible');
    btn.classList.toggle('active');
}

function formatLength(seconds) {
    if (!seconds || seconds <= 0) return '0:00';
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return m + ':' + String(s).padStart(2, '0');
}

function formatTime(seconds) {
    if (!seconds || isNaN(seconds)) return '0:00';
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return m + ':' + String(s).padStart(2, '0');
}

function buildQueryParams() {
    const params = new URLSearchParams();
    params.set('page', currentPage);

    const search = searchInput.value.trim();
    if (search) params.set('search', search);

    if (currentView === 'music') {
        const title = document.getElementById('filterTitle').value.trim();
        if (title) params.set('title', title);
        const artist = document.getElementById('filterArtist').value.trim();
        if (artist) params.set('artist', artist);
        const album = document.getElementById('filterAlbum').value.trim();
        if (album) params.set('album', album);
        const pub = document.getElementById('filterPublic').value;
        if (pub) params.set('is_public', pub);
    } else if (currentView === 'artists') {
        const name = document.getElementById('filterArtist').value.trim();
        if (name) params.set('name', name);
    } else if (currentView === 'albums') {
        const title = document.getElementById('filterTitle').value.trim();
        if (title) params.set('title', title);
        const artist = document.getElementById('filterArtist').value.trim();
        if (artist) params.set('artist', artist);
    } else if (currentView === 'playlists') {
        const title = document.getElementById('filterTitle').value.trim();
        if (title) params.set('title', title);
        const pub = document.getElementById('filterPublic').value;
        if (pub) params.set('is_public', pub);
    }

    return params;
}

async function doSearch() {
    currentPage = 1;
    await fetchAndRender();
}

async function fetchAndRender() {
    const container = document.getElementById('musicContainer');
    const spinner = document.getElementById('loadingSpinner');
    const pagination = document.getElementById('pagination');
    const cfg = VIEW_CONFIG[currentView];

    container.innerHTML = '';
    spinner.style.display = 'flex';
    pagination.style.display = 'none';

    try {
        const params = buildQueryParams();
        const resp = await fetch(cfg.api + '?' + params.toString(), {
            credentials: 'same-origin'
        });

        if (!resp.ok) throw new Error('Failed to fetch data');

        const data = await resp.json();
        currentData = data.results || [];
        totalResults = data.total || 0;

        spinner.style.display = 'none';

        if (currentData.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="var(--text-muted)" viewBox="0 0 16 16">
                        <path d="M6 13c0 1.105-1.12 2-2.5 2S1 14.105 1 13s1.12-2 2.5-2 2.5.895 2.5 2m9-2c0 1.105-1.12 2-2.5 2s-2.5-.895-2.5-2 1.12-2 2.5-2 2.5.895 2.5 2"/>
                        <path fill-rule="evenodd" d="M14 11V2h1v11zM1.5 2a.5.5 0 0 0-.5.5v11a.5.5 0 0 0 1 0V2.5A.5.5 0 0 0 1.5 2m13-1a.5.5 0 0 0-.5-.5H14v11h.5a.5.5 0 0 0 0-1h-13a.5.5 0 0 0 0 1H2V1.5a.5.5 0 0 0-.5-.5z"/>
                        <path d="M4 3a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1V4zm5-1a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1V2z"/>
                    </svg>
                    <h3>${cfg.emptyMsg}</h3>
                    <p>Try a different search.</p>
                </div>`;
            return;
        }

        renderCards(currentData);
        renderPagination();
    } catch (err) {
        spinner.style.display = 'none';
        container.innerHTML = `
            <div class="empty-state">
                <h3>Something went wrong</h3>
                <p>${err.message}</p>
            </div>`;
    }
}

function canEditDelete(item, view) {
    if (currentUserIsStaff) {
        console.log(`[canEditDelete] staff=true, allowing edit/delete for item ${item.id}`);
        return true;
    }
    if (view === 'music' || view === 'playlists') {
        const result = item.owner && item.owner == currentUserId;
        if (!result) {
            console.warn(`[canEditDelete] denied for item ${item.id}: owner=${item.owner}, currentUserId=${currentUserId}, view=${view}`);
        }
        return result;
    }
    return false;
}

function buildActionBtns(item, view) {
    if (!canEditDelete(item, view)) return { edit: '', del: '' };
    const typeMap = { music: 'music', artists: 'artist', albums: 'album', playlists: 'playlist' };
    const t = typeMap[view];
    if (!t) {
        console.warn(`[buildActionBtns] no type mapping for view="${view}", item.id=${item.id}`);
        return { edit: '', del: '' };
    }
    const id = item.id;
    const editUrl = `/${t}/${id}/edit/`;
    return {
        edit: `<button class="card-action-btn" onclick="event.stopPropagation(); window.location='${editUrl}'" title="Edit">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293zm-9.5-4.107 6.293 6.293-.293-.293H2v-.5h1.5v-1.5H2.5z"/>
            </svg>
        </button>`,
        del: `<button class="card-action-btn delete" onclick="event.stopPropagation(); deleteEntity('${t}', ${id})" title="Delete">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
                <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3V2h11v1h-11z"/>
            </svg>
        </button>`
    };
}

async function deleteEntity(type, id) {
    if (!confirm('Are you sure you want to delete this ' + type + '?')) return;
    try {
        const resp = await fetch(`/api/${type}/${id}/`, {
            method: 'DELETE',
            credentials: 'same-origin'
        });
        if (!resp.ok) throw new Error('Delete failed');
        await fetchAndRender();
    } catch (e) {
        alert('Failed to delete: ' + e.message);
    }
}

function renderCards(items) {
    const container = document.getElementById('musicContainer');
    const grid = document.createElement('div');
    grid.className = 'music-grid';
    const tpl = templates[currentView];

    items.forEach((item, i) => {
        let cardHtml;
        const actions = buildActionBtns(item, currentView);

        if (currentView === 'music') {
            const artistName = item.artist ? item.artist.name : 'Unknown Artist';
            const albumTitle = item.album ? item.album.title : 'Unknown Album';
            const lengthStr = formatLength(item.length);
            const playDisabled = item.has_file ? '' : 'disabled';

            cardHtml = tpl
                .replace(/\{\{id\}\}/g, item.id)
                .replace(/\{\{title\}\}/g, escapeHtml(item.title || 'Untitled'))
                .replace(/\{\{artist_name\}\}/g, escapeHtml(artistName))
                .replace(/\{\{album_title\}\}/g, escapeHtml(albumTitle))
                .replace(/\{\{length_formatted\}\}/g, lengthStr)
                .replace(/\{\{play_disabled\}\}/g, playDisabled)
                .replace(/\{\{fs_id\}\}/g, item.music_file || '')
                .replace(/\{\{card_edit_btn\}\}/g, actions.edit)
                .replace(/\{\{card_delete_btn\}\}/g, actions.del);

        } else if (currentView === 'artists') {
            cardHtml = tpl
                .replace(/\{\{id\}\}/g, item.id)
                .replace(/\{\{name\}\}/g, escapeHtml(item.name || 'Unknown'))
                .replace(/\{\{card_edit_btn\}\}/g, actions.edit)
                .replace(/\{\{card_delete_btn\}\}/g, actions.del);

        } else if (currentView === 'albums') {
            const artistName = item.artist ? item.artist.name : 'Unknown Artist';
            cardHtml = tpl
                .replace(/\{\{id\}\}/g, item.id)
                .replace(/\{\{title\}\}/g, escapeHtml(item.title || 'Untitled'))
                .replace(/\{\{artist_name\}\}/g, escapeHtml(artistName))
                .replace(/\{\{card_edit_btn\}\}/g, actions.edit)
                .replace(/\{\{card_delete_btn\}\}/g, actions.del);

        } else if (currentView === 'playlists') {
            cardHtml = tpl
                .replace(/\{\{id\}\}/g, item.id)
                .replace(/\{\{title\}\}/g, escapeHtml(item.title || 'Untitled'))
                .replace(/\{\{song_count\}\}/g, item.song_count || 0)
                .replace(/\{\{visibility\}\}/g, item.is_public ? 'Public' : 'Private')
                .replace(/\{\{card_edit_btn\}\}/g, actions.edit)
                .replace(/\{\{card_delete_btn\}\}/g, actions.del);

        } else if (currentView === 'users') {
            cardHtml = tpl
                .replace(/\{\{id\}\}/g, item.id)
                .replace(/\{\{username\}\}/g, escapeHtml(item.username || 'Unknown'))
                .replace(/\{\{profile_picture_url\}\}/g, item.profile_picture_url || '');
        }

        const temp = document.createElement('div');
        temp.innerHTML = cardHtml.trim();
        const card = temp.firstElementChild;
        card.style.animationDelay = (i * 0.03) + 's';

        if (cardHtml.includes('{{') || cardHtml.includes('}}')) {
            console.warn(`[renderCards] unresolved template placeholders in item ${item.id}:`, cardHtml.substring(0, 200));
        }

        if (currentView === 'music') {
            if (item.artist && item.artist.id && item.artist.cover_has_file) fetchCover(item.artist.id, card, 'artist');
        } else if (currentView === 'artists') {
            if (item.cover_has_file) fetchCover(item.id, card, 'artist');
        } else if (currentView === 'albums') {
            if (item.cover_has_file) {
                fetchCoverById(item.id, card, 'album');
            } else if (item.artist && item.artist.id && item.artist.cover_has_file) {
                fetchCover(item.artist.id, card, 'artist');
            }
        } else if (currentView === 'playlists') {
            if (item.cover_has_file) fetchCoverById(item.id, card, 'playlist');
        }

        grid.appendChild(card);
    });

    container.appendChild(grid);
}

async function fetchCover(entityId, cardEl, type) {
    const cacheKey = 'cover_' + type + '_' + entityId;
    const cached = sessionStorage.getItem(cacheKey);
    if (cached) {
        setCoverImage(cardEl, cached);
        return;
    }
    try {
        const resp = await fetch(`/api/${type}/${entityId}/download-cover/`, { credentials: 'same-origin' });
        if (resp.ok) {
            const data = await resp.json();
            if (data.download_url) {
                sessionStorage.setItem(cacheKey, data.download_url);
                setCoverImage(cardEl, data.download_url);
            }
        }
    } catch (e) { }
}

async function fetchCoverById(entityId, cardEl, type) {
    const cacheKey = 'cover_' + type + '_' + entityId;
    const cached = sessionStorage.getItem(cacheKey);
    if (cached) {
        setCoverImage(cardEl, cached);
        return;
    }
    try {
        const resp = await fetch(`/api/${type}/${entityId}/download-cover/`, { credentials: 'same-origin' });
        if (resp.ok) {
            const data = await resp.json();
            if (data.download_url) {
                sessionStorage.setItem(cacheKey, data.download_url);
                setCoverImage(cardEl, data.download_url);
            }
        }
    } catch (e) { }
}

function setCoverImage(cardEl, url) {
    const img = cardEl.querySelector('.music-card-cover img');
    if (img) img.src = url;
}

function renderPagination() {
    const pagination = document.getElementById('pagination');
    const totalPages = Math.ceil(totalResults / PAGE_SIZE);

    if (totalResults <= PAGE_SIZE) {
        pagination.style.display = 'none';
        return;
    }

    pagination.style.display = 'flex';
    document.getElementById('prevBtn').disabled = currentPage <= 1;
    document.getElementById('nextBtn').disabled = currentPage >= totalPages;
    document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
}

function changePage(delta) {
    currentPage += delta;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    fetchAndRender();
}

async function togglePlay(musicId, btnEl) {
    if (currentPlayingId === musicId && isPlaying) {
        pauseMusic();
        return;
    }
    if (currentPlayingId === musicId && !isPlaying) {
        resumeMusic();
        return;
    }
    await playMusic(musicId);
}

async function playMusic(musicId) {
    const musicItem = currentData.find(m => m.id === musicId);
    if (!musicItem) return;

    showPlayerBar(musicItem);

    if (audioCache.has(musicId)) {
        audio.src = audioCache.get(musicId);
        audio.play();
        setPlayingState(musicId, true);
        return;
    }

    const cachedUrl = sessionStorage.getItem('dl_' + musicId);
    if (cachedUrl) {
        try {
            const blob = await fetchAudioBlob(cachedUrl);
            const blobUrl = URL.createObjectURL(blob);
            audioCache.set(musicId, blobUrl);
            audio.src = blobUrl;
            audio.play();
            setPlayingState(musicId, true);
            return;
        } catch (e) {
            sessionStorage.removeItem('dl_' + musicId);
        }
    }

    try {
        const resp = await fetch(`/api/music/${musicId}/download/`, { credentials: 'same-origin' });
        if (!resp.ok) throw new Error('Download unavailable');

        const data = await resp.json();
        if (!data.download_url) throw new Error('No download URL');

        sessionStorage.setItem('dl_' + musicId, data.download_url);

        const blob = await fetchAudioBlob(data.download_url);
        const blobUrl = URL.createObjectURL(blob);
        audioCache.set(musicId, blobUrl);
        audio.src = blobUrl;
        audio.play();
        setPlayingState(musicId, true);
    } catch (err) {
        console.error('Failed to play:', err);
    }
}

async function fetchAudioBlob(url) {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('Failed to fetch audio');
    return await resp.blob();
}

function pauseMusic() {
    audio.pause();
    setPlayingState(currentPlayingId, false);
}

function resumeMusic() {
    audio.play();
    setPlayingState(currentPlayingId, true);
}

function setPlayingState(musicId, playing) {
    isPlaying = playing;
    currentPlayingId = musicId;

    document.querySelectorAll('.music-card').forEach(card => {
        const id = parseInt(card.dataset.musicId);
        const btn = card.querySelector('.music-card-play-btn');
        if (!btn) return;

        if (id === musicId && playing) {
            card.classList.add('playing');
            btn.querySelector('.icon-play').style.display = 'none';
            btn.querySelector('.icon-pause').style.display = 'block';
        } else {
            card.classList.remove('playing');
            btn.querySelector('.icon-play').style.display = 'block';
            btn.querySelector('.icon-pause').style.display = 'none';
        }
    });

    updatePlayerPlayBtn(playing);
}

function updatePlayerPlayBtn(playing) {
    const btn = document.getElementById('playerPlayBtn');
    btn.querySelector('.icon-play').style.display = playing ? 'none' : 'block';
    btn.querySelector('.icon-pause').style.display = playing ? 'block' : 'none';
}

function playerTogglePlay() {
    if (!currentPlayingId) return;
    if (isPlaying) {
        pauseMusic();
    } else {
        resumeMusic();
    }
}

function playerStop() {
    audio.pause();
    audio.currentTime = 0;
    setPlayingState(currentPlayingId, false);
    document.getElementById('playerProgressFill').style.width = '0%';
    document.getElementById('playerCurrentTime').textContent = '0:00';
}

function showPlayerBar(musicItem) {
    const bar = document.getElementById('playerBar');
    bar.classList.remove('hidden');

    document.getElementById('playerTitle').textContent = musicItem.title || 'Untitled';
    document.getElementById('playerArtist').textContent = musicItem.artist ? musicItem.artist.name : 'Unknown Artist';
    document.getElementById('playerTotalTime').textContent = formatLength(musicItem.length);

    const coverEl = document.getElementById('playerCover');
    if (musicItem.artist && musicItem.artist.id) {
        const cacheKey = 'cover_artist_' + musicItem.artist.id;
        const cached = sessionStorage.getItem(cacheKey);
        if (cached) {
            coverEl.innerHTML = `<img src="${cached}" alt="Cover">`;
        } else {
            coverEl.innerHTML = '';
            fetch(`/api/artist/${musicItem.artist.id}/download-cover/`, { credentials: 'same-origin' })
                .then(r => r.ok ? r.json() : null)
                .then(data => {
                    if (data && data.download_url) {
                        sessionStorage.setItem(cacheKey, data.download_url);
                        coverEl.innerHTML = `<img src="${data.download_url}" alt="Cover">`;
                    }
                }).catch(() => {});
        }
    }
}

function seekAudio(event) {
    if (!audio.duration) return;
    const bar = document.getElementById('playerProgress');
    const rect = bar.getBoundingClientRect();
    const ratio = (event.clientX - rect.left) / rect.width;
    audio.currentTime = ratio * audio.duration;
}

function setVolume(val) {
    audio.volume = val;
    updateVolumeIcon(val);
}

function toggleMute() {
    const slider = document.getElementById('volumeSlider');
    if (audio.volume > 0) {
        audio._prevVolume = audio.volume;
        audio.volume = 0;
        slider.value = 0;
    } else {
        audio.volume = audio._prevVolume || 1;
        slider.value = audio.volume;
    }
    updateVolumeIcon(audio.volume);
}

audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('playerProgressFill').style.width = pct + '%';
    document.getElementById('playerCurrentTime').textContent = formatTime(audio.currentTime);
});

audio.addEventListener('ended', () => {
    setPlayingState(currentPlayingId, false);
    document.getElementById('playerProgressFill').style.width = '0%';
    document.getElementById('playerCurrentTime').textContent = '0:00';
});

audio.addEventListener('error', () => {
    setPlayingState(currentPlayingId, false);
});

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

async function downloadMusic(musicId) {
    const item = currentData.find(m => m.id === musicId);
    const title = item ? (item.title || 'music') : 'music';

    try {
        let blobUrl;

        if (audioCache.has(musicId)) {
            blobUrl = audioCache.get(musicId);
        } else {
            let downloadUrl = sessionStorage.getItem('dl_' + musicId);

            if (!downloadUrl) {
                const resp = await fetch(`/api/music/${musicId}/download/`, { credentials: 'same-origin' });
                if (!resp.ok) throw new Error('Download unavailable');
                const data = await resp.json();
                if (!data.download_url) throw new Error('No URL');
                downloadUrl = data.download_url;
                sessionStorage.setItem('dl_' + musicId, downloadUrl);
            }

            const blob = await fetchAudioBlob(downloadUrl);
            blobUrl = URL.createObjectURL(blob);
            audioCache.set(musicId, blobUrl);
        }

        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = title + '.mp3';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    } catch (e) {
        console.error('Download failed:', e);
    }
}

loadTemplates().then(() => fetchAndRender());
</script>
