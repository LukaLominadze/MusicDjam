{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Earpiece{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/base.css' %}?v=1.0">
    {% block head %}
    {% endblock %}
</head>
<body>
    <nav class="top-nav">
        <a href="/" class="nav-logo-link">
            <span class="nav-logo">Earpiece</span>
        </a>
        {% if user.is_authenticated %}
        <div class="nav-actions">
            <a href="/music/add/" class="nav-add-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M11.5 6v4.5a3.505 3.505 0 0 0 7 0V6zm-7 0V4.5a3.505 3.505 0 0 0 7 0V6"/><path d="M1.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5M2 2a1 1 0 0 0-1 1v1h14V3a1 1 0 0 0-1-1zm13 3H1v9a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1z"/></svg>
                <span>Music</span>
            </a>
            <a href="/artist/add/" class="nav-add-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/></svg>
                <span>Artist</span>
            </a>
            <a href="/album/add/" class="nav-add-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M6 13c0 1.105-1.12 2-2.5 2S1 14.105 1 13s1.12-2 2.5-2S6 11.895 6 13"/><path d="M14 12V8a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v4"/><path d="M14 12c0 1.105-1.12 2-2.5 2S9 13.105 9 12s1.12-2 2.5-2S14 10.895 14 12"/><path d="M8 4v8"/><path d="M3 12h8"/><path d="M8 4a3 3 0 0 0-3 3v1h6V7a3 3 0 0 0-3-3"/></svg>
                <span>Album</span>
            </a>
            <a href="/playlist/add/" class="nav-add-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M2 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1z"/><path d="M9.5 3a.5.5 0 0 1 .5.5v5.21l1.146-1.147a.5.5 0 0 1 .708.708l-2 2a.5.5 0 0 1-.708 0l-2-2a.5.5 0 1 1 .708-.708L9 8.71V3.5a.5.5 0 0 1 .5-.5"/></svg>
                <span>Playlist</span>
            </a>
        </div>
        {% endif %}
        <a href="{% if user.is_authenticated %}{% url 'profile' %}{% else %}{% url 'login' %}{% endif %}" class="nav-avatar-link">
            <div class="nav-avatar">
                {% if nav_profile_picture_url %}
                    <img src="{{ nav_profile_picture_url }}" alt="Profile">
                {% else %}
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="var(--text-muted)" viewBox="0 0 16 16">
                        <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/>
                    </svg>
                {% endif %}
            </div>
        </a>
    </nav>
    {% block body %}
    {% endblock %}
</body>
</html>
