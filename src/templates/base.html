<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Earpiece{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #0f0720;
            --bg-card: #1a0e30;
            --bg-input: #12092a;
            --accent-pink: #e91e8c;
            --accent-gold: #f5a623;
            --accent-purple: #9b59b6;
            --text-primary: #ffffff;
            --text-muted: #b0a0c8;
            --border-subtle: rgba(233, 30, 140, 0.2);
            --glow-pink: rgba(233, 30, 140, 0.35);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            padding-top: 76px;
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -40%;
            left: -20%;
            width: 60%;
            height: 80%;
            background: radial-gradient(ellipse, rgba(233, 30, 140, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            right: -20%;
            width: 50%;
            height: 70%;
            background: radial-gradient(ellipse, rgba(245, 166, 35, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .auth-card {
            background: linear-gradient(145deg, rgba(26, 14, 48, 0.95), rgba(18, 9, 42, 0.98));
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.4),
                0 0 80px rgba(233, 30, 140, 0.06);
        }

        .auth-card:hover {
            box-shadow:
                0 12px 48px rgba(0, 0, 0, 0.5),
                0 0 100px rgba(233, 30, 140, 0.1);
        }

        .app-logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .app-logo-icon {
            display: inline-block;
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-gold));
            border-radius: 14px;
            text-align: center;
            line-height: 48px;
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
            box-shadow: 0 4px 20px rgba(233, 30, 140, 0.3);
        }

        .auth-form .form-label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .auth-form .form-control {
            background: var(--bg-input);
            border: 1.5px solid rgba(155, 89, 182, 0.2);
            border-radius: 12px;
            color: var(--text-primary);
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            transition: all 0.25s ease;
        }

        .auth-form .form-control::placeholder {
            color: rgba(176, 160, 200, 0.5);
        }

        .auth-form .form-control:focus {
            border-color: var(--accent-pink);
            box-shadow: 0 0 0 3px var(--glow-pink);
            background: var(--bg-input);
            color: var(--text-primary);
        }

        .input-group {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1rem;
            z-index: 4;
            pointer-events: none;
            transition: color 0.25s ease;
        }

        .input-group:focus-within .input-icon {
            color: var(--accent-pink);
        }

        .input-group .form-control {
            padding-left: 2.8rem;
        }

        .btn-auth {
            background: linear-gradient(135deg, var(--accent-pink), #c01070, var(--accent-gold));
            background-size: 200% 200%;
            border: none;
            border-radius: 12px;
            padding: 0.75rem;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
            color: #fff;
            transition: all 0.35s ease;
            box-shadow: 0 4px 20px rgba(233, 30, 140, 0.3);
        }

        .btn-auth:hover {
            background-position: 100% 0;
            box-shadow: 0 6px 30px rgba(233, 30, 140, 0.5);
            transform: translateY(-1px);
        }

        .btn-auth:active {
            transform: translateY(0);
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-subtle), transparent);
        }

        .auth-link {
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .auth-link:hover {
            color: #ffcc66;
            text-decoration: underline;
        }

        .auth-subtext {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .auth-container {
            min-height: calc(100vh - 76px);
            position: relative;
            z-index: 1;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-card {
            animation: fadeInUp 0.6s ease-out;
        }

        .form-text-muted {
            font-size: 0.78rem;
            color: var(--text-muted);
            opacity: 0.7;
        }

        .field-error {
            display: none;
            align-items: center;
            gap: 0.4rem;
            margin-top: 0.45rem;
            padding: 0.5rem 0.75rem;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #ffb3b3;
            background: rgba(255, 50, 50, 0.1);
            border: 1px solid rgba(255, 50, 50, 0.25);
            animation: errorSlideIn 0.3s ease-out;
        }

        .field-error.is-visible {
            display: flex;
        }

        .field-error svg {
            flex-shrink: 0;
        }

        .form-control.has-error {
            border-color: rgba(255, 50, 50, 0.6) !important;
            box-shadow: 0 0 0 3px rgba(255, 50, 50, 0.15) !important;
        }

        .form-control.has-error:focus {
            border-color: #ff3232 !important;
            box-shadow: 0 0 0 3px rgba(255, 50, 50, 0.25) !important;
        }

        @keyframes errorSlideIn {
            from {
                opacity: 0;
                transform: translateY(-6px);
                max-height: 0;
            }
            to {
                opacity: 1;
                transform: translateY(0);
                max-height: 80px;
            }
        }

        @keyframes errorSlideOut {
            from {
                opacity: 1;
                transform: translateY(0);
                max-height: 80px;
            }
            to {
                opacity: 0;
                transform: translateY(-6px);
                max-height: 0;
            }
        }

        .field-error.is-hiding {
            display: flex;
            animation: errorSlideOut 0.25s ease-in forwards;
        }

        .global-error {
            display: none;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #ffb3b3;
            background: rgba(255, 50, 50, 0.12);
            border: 1px solid rgba(255, 50, 50, 0.3);
            animation: errorSlideIn 0.3s ease-out;
        }

        .global-error.is-visible {
            display: flex;
        }

        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(15, 7, 32, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            z-index: 100;
        }

        .nav-logo-link {
            text-decoration: none;
        }

        .nav-logo {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-avatar-link {
            text-decoration: none;
        }

        .nav-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-input);
            border: 2px solid rgba(155, 89, 182, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .nav-avatar:hover {
            border-color: var(--accent-pink);
            box-shadow: 0 0 12px rgba(233, 30, 140, 0.25);
        }

        .nav-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
{% block head %}
{% endblock %}
<body>
    <nav class="top-nav">
        <a href="/" class="nav-logo-link">
            <span class="nav-logo">Earpiece</span>
        </a>
        <a href="{% if user.is_authenticated %}{% url 'profile' %}{% else %}{% url 'login' %}{% endif %}" class="nav-avatar-link">
            <div class="nav-avatar">
                {% if nav_profile_picture_url %}
                    <img src="{{ nav_profile_picture_url }}" alt="Profile">
                {% else %}
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="var(--text-muted)" viewBox="0 0 16 16">
                        <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/>
                    </svg>
                {% endif %}
            </div>
        </a>
    </nav>
    {% block body %}
    {% endblock %}
</body>
</html>
